<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遊戲開場網站</title>

  <link rel="stylesheet" href="style.css">  
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>

<body>

<div class="scene">

  <img class="bg" src="images/bg.png">
  <img class="bg bg2" src="images/bg2.png">
  <img class="bg bg2" src="images/IMG_2518.png">
  <img class="spawnPerson" src="images/white1.png">

  <!-- 🔥 轉場層 -->
  <img id="transition" class="transition" src="" />

  <!-- UI -->
  <div class="buttons">

    <button>
      開始租屋
      <img src="images/white1.png" class="btnIcon">
    </button>

    <button onclick="goInfo()">
      遊玩須知
      <img src="images/white8.png" class="btnIcon">
    </button>

    <button onclick="goAbout()">
      關於我們
      <img src="images/white3.png" class="btnIcon">
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
